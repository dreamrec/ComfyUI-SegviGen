# ComfyUI-SegviGen - Environment Configuration
# Run: comfy-env install
# Schema mirrors ComfyUI-TRELLIS2/comfy-env.toml (same comfy-env tool).
# No "extends" key is supported by the current comfy-env schema, so all
# required packages are declared inline.

[segvigen]
python = "3.12"
cuda_version = "auto"      # 12.8 for Turing+, 12.4 for Pascal
pytorch_version = "auto"   # 2.8.0 for cu128, 2.4.0 for cu124

    [segvigen.cuda]
    # CUDA extensions - resolved automatically by comfy-env
    nvdiffrast = "*"
    flex_gemm = "*"
    cumesh = "*"
    o_voxel = "*"
    nvdiffrec_render = "*"
    flash-attn = "2.8.3"     # Required for sparse attention (varlen ops)

    [segvigen.packages]
    requirements = [
        # HuggingFace
        "huggingface_hub>=0.20.0,<1.0.0",
        "transformers>=4.56.0",
        "safetensors",

        # 3D processing
        "trimesh>=3.0.0",

        # ML utilities
        "timm",
        "einops",
        "easydict",

        # Image processing
        "pillow>=9.0.0",
        "opencv-python-headless",

        # General
        "numpy>=1.21.0",
        "tqdm",
        "zstandard",
    ]

    [segvigen.packages.windows]
    requirements = ["triton-windows>=3.5.0"]

    [segvigen.packages.linux]
    requirements = ["triton>=3.0.0"]
